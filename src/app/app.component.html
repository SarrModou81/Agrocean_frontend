<div class="app-container">
  <!-- Loading overlay -->
  <div *ngIf="loading" class="loading-overlay">
    <div class="spinner"></div>
  </div>

  <!-- Auth layout -->
  <div *ngIf="isAuthRoute" class="auth-layout">
    <router-outlet></router-outlet>
  </div>

  <!-- Main layout -->
  <div *ngIf="!isAuthRoute && isAuthenticated" class="main-layout">
    <!-- Header -->
    <app-header (toggleSidebar)="toggleSidebar()"></app-header>

    <div class="layout-body">
      <!-- Sidebar -->
      <app-sidebar [class.collapsed]="sidebarCollapsed"></app-sidebar>

      <!-- Main content -->
      <main class="main-content" [class.collapsed]="sidebarCollapsed">
        <div class="content-wrapper">
          <router-outlet></router-outlet>
        </div>
        <app-footer></app-footer>
      </main>
    </div>
  </div>

  <!-- Redirect to login if not authenticated and not on auth route -->
  <div *ngIf="!isAuthenticated && !isAuthRoute" class="redirect-message">
    <div class="text-center">
      <i class="fas fa-spinner fa-spin fa-2x mb-3"></i>
      <p>Redirection vers la page de connexion...</p>
    </div>
  </div>
</div>
