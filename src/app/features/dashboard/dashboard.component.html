<div class="dashboard-container">
  <!-- Page header -->
  <div class="page-header mb-4">
    <div class="d-flex justify-content-between align-items-center">
      <div>
        <h1 class="page-title">
          <i class="fas fa-tachometer-alt me-3"></i>
          Dashboard
        </h1>
        <p class="page-subtitle text-muted">
          Vue d'ensemble de votre activité
        </p>
      </div>
      <button mat-raised-button 
              color="primary" 
              (click)="refreshData()"
              [disabled]="loading">
        <mat-icon>refresh</mat-icon>
        Actualiser
      </button>
    </div>
  </div>

  <!-- Loading state -->
  <div *ngIf="loading" class="text-center py-5">
    <mat-spinner diameter="50"></mat-spinner>
    <p class="mt-3 text-muted">Chargement des données...</p>
  </div>

  <!-- Dashboard content -->
  <div *ngIf="!loading && stats" class="dashboard-content">
    <!-- Stats cards -->
    <app-stats-cards [stats]="stats" class="mb-4"></app-stats-cards>

    <!-- Charts and data -->
    <div class="row">
      <!-- Sales chart -->
      <div class="col-lg-8 mb-4">
        <app-sales-chart></app-sales-chart>
      </div>

      <!-- Alerts -->
      <div class="col-lg-4 mb-4">
        <app-alerts-list></app-alerts-list>
      </div>
    </div>

    <div class="row">
      <!-- Top products -->
      <div class="col-lg-6 mb-4">
        <app-top-products></app-top-products>
      </div>

      <!-- Recent orders -->
      <div class="col-lg-6 mb-4">
        <app-recent-orders></app-recent-orders>
      </div>
    </div>
  </div>

  <!-- Error state -->
  <div *ngIf="!loading && !stats" class="text-center py-5">
    <mat-icon class="error-icon" color="warn">error</mat-icon>
    <h3 class="mt-3">Erreur de chargement</h3>
    <p class="text-muted">Impossible de charger les données du dashboard</p>
    <button mat-raised-button color="primary" (click)="refreshData()">
      Réessayer
    </button>
  </div>
</div>
