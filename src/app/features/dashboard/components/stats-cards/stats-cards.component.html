<div class="stats-cards">
  <div class="row">
    <div class="col-lg-3 col-md-6 mb-3" *ngFor="let card of statCards">
      <mat-card class="stat-card" [ngClass]="card.color">
        <mat-card-content>
          <div class="stat-content">
            <div class="stat-text">
              <div class="stat-value">{{ card.value }}</div>
              <div class="stat-title">{{ card.title }}</div>
              <div class="stat-subtitle" *ngIf="card.subtitle">{{ card.subtitle }}</div>
            </div>
            <div class="stat-icon">
              <i [class]="card.icon"></i>
            </div>
          </div>
        </mat-card-content>
      </mat-card>
    </div>
  </div>
</div>
