<mat-card class="chart-card">
  <mat-card-header>
    <mat-card-title>
      <i class="fas fa-chart-line me-2"></i>
      Évolution des ventes
    </mat-card-title>
    <div class="chart-controls ms-auto">
      <mat-form-field appearance="outline" class="year-select">
        <mat-label>Année</mat-label>
        <mat-select [value]="currentYear" (selectionChange)="onYearChange($event.value)">
          <mat-option [value]="currentYear - 2">{{ currentYear - 2 }}</mat-option>
          <mat-option [value]="currentYear - 1">{{ currentYear - 1 }}</mat-option>
          <mat-option [value]="currentYear">{{ currentYear }}</mat-option>
        </mat-select>
      </mat-form-field>
    </div>
  </mat-card-header>
  
  <mat-card-content>
    <div *ngIf="loading" class="text-center py-4">
      <mat-spinner diameter="40"></mat-spinner>
    </div>
    
    <div *ngIf="!loading" class="chart-container">
      <canvas baseChart
              [data]="lineChartData"
              [options]="lineChartOptions"
              [type]="lineChartType">
      </canvas>
    </div>
  </mat-card-content>
</mat-card>
