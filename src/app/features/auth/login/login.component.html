<div class="auth-container">
  <div class="auth-card-container">
    <mat-card class="auth-card">
      <mat-card-header class="auth-header">
        <div class="auth-logo">
          <i class="fas fa-leaf"></i>
        </div>
        <mat-card-title>Agrocean</mat-card-title>
        <mat-card-subtitle>Connectez-vous à votre compte</mat-card-subtitle>
      </mat-card-header>

      <mat-card-content>
        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Email</mat-label>
            <input matInput 
                   type="email" 
                   formControlName="email"
                   placeholder="votre@email.com">
            <mat-icon matSuffix>email</mat-icon>
            <mat-error *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.errors">
              {{ getErrorMessage('email') }}
            </mat-error>
          </mat-form-field>

          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Mot de passe</mat-label>
            <input matInput 
                   [type]="hidePassword ? 'password' : 'text'"
                   formControlName="password"
                   placeholder="Votre mot de passe">
            <button mat-icon-button 
                    matSuffix 
                    type="button"
                    (click)="hidePassword = !hidePassword">
              <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
            </button>
            <mat-error *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.errors">
              {{ getErrorMessage('password') }}
            </mat-error>
          </mat-form-field>

          <button mat-raised-button 
                  color="primary" 
                  type="submit" 
                  class="full-width auth-submit-btn"
                  [disabled]="loading">
            <span *ngIf="!loading">Se connecter</span>
            <span *ngIf="loading">
              <i class="fas fa-spinner fa-spin me-2"></i>
              Connexion...
            </span>
          </button>
        </form>
      </mat-card-content>

      <mat-card-actions class="auth-actions">
        <p class="text-center">
          Pas de compte ? 
          <a routerLink="/auth/register" class="auth-link">Créer un compte</a>
        </p>
      </mat-card-actions>
    </mat-card>
  </div>
</div>
