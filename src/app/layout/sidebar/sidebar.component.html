<div class="sidebar bg-light shadow-sm">
  <div class="sidebar-content">
    <ul class="nav flex-column">
      <ng-container *ngFor="let item of menuItems">
        <li class="nav-item" *ngIf="hasAccess(item.roles)">
          <!-- Item with children -->
          <div *ngIf="item.children && item.children.length > 0">
            <a class="nav-link d-flex justify-content-between align-items-center"
               (click)="toggleExpanded(item.label)"
               [class.active]="isExpanded(item.label)">
              <span>
                <i [class]="item.icon + ' me-2'"></i>
                {{ item.label }}
              </span>
              <i class="fas fa-chevron-down transition"
                 [class.rotate-180]="isExpanded(item.label)"></i>
            </a>
            <div class="collapse" [class.show]="isExpanded(item.label)">
              <ul class="nav flex-column ms-3">
                <li class="nav-item" *ngFor="let child of item.children">
                  <a class="nav-link py-2" 
                     *ngIf="hasAccess(child.roles)"
                     [routerLink]="child.route"
                     routerLinkActive="active">
                    <i [class]="child.icon + ' me-2'"></i>
                    {{ child.label }}
                  </a>
                </li>
              </ul>
            </div>
          </div>
          
          <!-- Item without children -->
          <a *ngIf="!item.children || item.children.length === 0"
             class="nav-link"
             [routerLink]="item.route"
             routerLinkActive="active">
            <i [class]="item.icon + ' me-2'"></i>
            {{ item.label }}
          </a>
        </li>
      </ng-container>
    </ul>
  </div>
</div>
